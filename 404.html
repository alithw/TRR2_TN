<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không Tìm Thấy Đỉnh | Toán Rời Rạc 2</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&family=Outfit:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-secondary: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-blue-light: rgba(59, 130, 246, 0.1);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(30, 41, 59, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Decorative nodes background */
        .bg-graph {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.05;
            pointer-events: none;
        }

        .container {
            max-width: 550px;
            width: 100%;
            text-align: center;
            z-index: 2;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .icon-area {
            position: relative;
            margin-bottom: 8px;
        }

        .error-code {
            font-size: 100px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-blue), #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .badge-404 {
            background-color: var(--accent-blue-light);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 8px;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .math-joke {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border-color);
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .btn-home {
            background-color: var(--accent-blue);
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-home:hover {
            background-color: var(--accent-blue-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <svg class="bg-graph" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
        <!-- Background graph diagram representation -->
        <circle cx="200" cy="150" r="10" fill="#fff" />
        <circle cx="600" cy="150" r="10" fill="#fff" />
        <circle cx="400" cy="300" r="15" fill="#fff" />
        <circle cx="300" cy="450" r="10" fill="#fff" />
        <circle cx="500" cy="450" r="10" fill="#fff" />
        <line x1="200" y1="150" x2="400" y2="300" stroke="#fff" stroke-width="2" />
        <line x1="600" y1="150" x2="400" y2="300" stroke="#fff" stroke-width="2" />
        <line x1="300" y1="450" x2="400" y2="300" stroke="#fff" stroke-width="2" />
        <line x1="500" y1="450" x2="400" y2="300" stroke="#fff" stroke-width="2" />
        <line x1="300" y1="450" x2="500" y2="450" stroke="#fff" stroke-width="2" />
    </svg>

    <div class="container">
        <div class="card">
            <div class="icon-area">
                <div class="error-code">404</div>
            </div>
            
            <div class="badge-404">
                <i class="fa-solid fa-circle-nodes"></i> Đỉnh không tồn tại
            </div>

            <h2>Không Tìm Thấy Trang Yêu Cầu</h2>
            
            <p>Đường đi từ vị trí hiện tại của bạn đến liên kết này có độ dài bằng vô cùng: d[đích] = ∞.</p>
            
            <div class="math-joke">
                Thuật toán duyệt đồ thị (BFS/DFS) báo cáo rằng trang bạn tìm kiếm không nằm trong cùng một thành phần liên thông với trang chủ!
            </div>

            <a href="/" class="btn-home">
                <i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ
            </a>
        </div>
    </div>
</body>
</html>
